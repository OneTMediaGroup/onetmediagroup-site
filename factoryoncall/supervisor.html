<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Factory On Call – Supervisor Portal</title>
    <link rel="stylesheet" href="supervisor.css?v=20260625-emergency-clear" />
<script>
if('scrollRestoration' in history){history.scrollRestoration='manual';}
window.addEventListener('pageshow',()=>window.scrollTo(0,0));
window.addEventListener('load',()=>window.scrollTo(0,0));
</script>
</head>
<body>
<div id="supervisor-root">
    <header class="portal-header">
        <div class="ph-left">
            <img class="ph-logo" hidden alt="Factory On Call" />
            <div>
                <div class="ph-title" style="display:none">FACTORY ON CALL</div>
                <div class="ph-subtitle">Supervisor Portal</div>
            </div>
        </div>
        <div class="ph-center">
            <div class="ph-company-name">Your Company</div>
        </div>
        <div class="ph-right">
            <span class="ph-status-dot" id="connDot"></span>
            <span id="connLabel">Connecting…</span>
        </div>
    </header>

    <main class="portal-main">
        <section class="portal-top">
            <div class="metric-card">
                <div class="metric-label">Active Calls</div>
                <div class="metric-value" id="sbActive">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Waiting</div>
                <div class="metric-value" id="sbWaiting">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Acknowledged</div>
                <div class="metric-value" id="sbOnWay">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Closed Today</div>
                <div class="metric-value" id="sbClosed">0</div>
            </div>
        </section>

        <section class="portal-card">
            <div class="card-head">
                <div>
                    <h1>Live Call Management</h1>
                    <p>Review, acknowledge, and close active calls.</p>
                </div>
                <div class="portal-user" id="portalUserLabel">Supervisor</div>
            </div>

            <div class="filter-bar">
                <input id="callSearch" type="search" placeholder="Search station, area, personnel..." />
                <select id="areaFilter"><option value="">All Areas</option></select>
                <select id="personnelFilter"><option value="">All Personnel</option></select>
                <select id="statusFilter">
                    <option value="active">Active Calls</option>
                    <option value="waiting">Waiting Only</option>
                    <option value="ack">Acknowledged Only</option>
                    <option value="all">All Recent</option>
                </select>
            </div>

            <div id="activeCalls" class="call-table"></div>
        </section>

        <section class="portal-card recent-card">
            <div class="card-head compact">
                <h2>Recent Activity</h2>
                <p>Latest call activity for supervisor review.</p>
            </div>
            <div id="recentCalls" class="recent-table"></div>
        </section>
    </main>

    <footer class="portal-footer">© One T Media Group</footer>
</div>
<script src="supervisor.js?v=20260625-resolution-summary"></script>
</body>
</html>
