<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Factory On Call – Call Station</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#eef3f8" media="(prefers-color-scheme: light)" />
    <link rel="stylesheet" href="call.css?v=station-floor-visibility-v181" />
<script>
if('scrollRestoration' in history){history.scrollRestoration='manual';}
window.addEventListener('pageshow',()=>window.scrollTo(0,0));
window.addEventListener('load',()=>window.scrollTo(0,0));
</script>
</head>

<body>
    <div class="app-shell">

        <header class="app-header">
            <div class="header-left">
                <img class="factory-logo" hidden />
                <div class="app-title">Factory On Call</div>
            </div>

            <div class="header-center">
                <span id="customerName">Your Company</span>
            </div>

            <div class="header-right">
                <span id="stationStatus" class="status-pill status-ready">Ready</span>
            </div>
        </header>

        <main class="app-main">
            <section id="callScreen" class="call-panel">

                <div class="circle-wrapper">
                    <div class="circle-outer"></div>
                    <div class="circle-middle"></div>
                    <div class="circle-inner">
                        <div id="circleMainLabel" class="circle-label-main">Roles</div>
                        <div id="circleSubLabel" class="circle-label-sub">Select then send call</div>
                    </div>
                </div>

                <div id="stationLiveStatus" class="station-live-status hidden" aria-live="polite">
                    <div class="station-live-card">
                        <span class="station-live-label">Current Downtime</span>
                        <strong id="stationElapsedTime">00:00</strong>
                    </div>
                    <div class="station-live-card">
                        <span class="station-live-label">Call Status</span>
                        <strong id="stationCallStatusText">Ready</strong>
                    </div>
                    <div class="station-live-card">
                        <span class="station-live-label">Acknowledged By</span>
                        <strong id="stationAckByText">—</strong>
                    </div>
                </div>

                <button id="sendCallBtn" class="send-btn" disabled>Send Call</button>
                <button id="emergencyStationBtn" class="emergency-station-btn hidden" type="button">Emergency</button>

                <p id="hintText" class="hint-text">
                    Select one or more roles below, then press <strong>Send Call</strong>.
                </p>

                <h2 class="roles-heading">Available Roles</h2>
                <div id="rolesGrid" class="roles-grid"></div>

                <button id="signInBtn" class="sign-in-btn hidden">Sign in to unlock</button>

            </section>
        </main>

    </div>

    <!-- UNLOCK OVERLAY -->
    <div id="lockOverlay" class="lock-overlay hidden">
        <div class="lock-card">
            <button id="lockCloseBtn" class="lock-close-btn" type="button" aria-label="Close unlock panel">×</button>

            <div class="lock-company">Your Company</div>
            <div class="lock-title">Station Locked</div>
            <p class="lock-desc">Enter your User ID and PIN</p>

            <div class="lock-input-row">
                <input id="lockUserId" type="password" placeholder="User ID" autocomplete="off" inputmode="numeric" />
                <input id="lockPin" type="password" placeholder="PIN" autocomplete="off" inputmode="numeric" />
            </div>

            <div class="lock-keypad">
                <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
                <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
                <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
                <button data-action="clear">CLR</button><button data-key="0">0</button>
                <button data-action="backspace">⌫</button>
            </div>

            <label class="lock-resolution-label" for="lockResolutionSummary">
                <span>Resolution Summary</span>
                <textarea id="lockResolutionSummary" class="lock-resolution-input" rows="3" placeholder="Example: Cleaned sensor. Machine tested OK."></textarea>
            </label>

            <button id="unlockBtn" class="unlock-btn">Unlock</button>

        </div>
    </div>

    <script src="call.js?v=20260626-demo-light-emergency"></script>
</body>
</html>
