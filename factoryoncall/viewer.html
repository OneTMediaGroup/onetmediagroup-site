<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Factory On Call – Interactive Viewer</title>
    <link rel="stylesheet" href="viewer.css?v=20260624-viewer-mobile-clean-final" />
<script>
if('scrollRestoration' in history){history.scrollRestoration='manual';}
window.addEventListener('pageshow',()=>window.scrollTo(0,0));
window.addEventListener('load',()=>window.scrollTo(0,0));
</script>
</head>

<body>
<div id="viewer-root">

    <header class="viewer-header">
        <div class="vh-left">
            <img class="vh-logo" hidden alt="Factory On Call" />
            <div class="vh-title" style="display:none">FACTORY ON CALL</div>
        </div>

        <div class="vh-center">
            <div class="vh-company-name">Your Company</div>
        </div>

        <div class="vh-right">
            <span class="vh-status-dot" id="connDot"></span>
            <span id="connLabel">Connecting…</span>
        </div>
    </header>

    <main class="viewer-main">
        <section class="viewer-section">
            <div class="section-head">
                <div>
                    <h2 class="section-title">Active Calls</h2>
                    <p class="section-subtitle">Shared viewer for tool rooms, offices, tablets, and common areas.</p>
                </div>
            </div>

            <div class="viewer-filters">
                <input id="callSearch" class="viewer-input" type="search" placeholder="Search station, area, personnel..." />
                <select id="areaFilter" class="viewer-select">
                    <option value="">All Areas</option>
                </select>
                <select id="personnelFilter" class="viewer-select">
                    <option value="">All Personnel</option>
                </select>
                <select id="statusFilter" class="viewer-select">
                    <option value="active">Active Calls</option>
                    <option value="waiting">Waiting</option>
                    <option value="ack">Acknowledged</option>
                </select>
            </div>

            <div id="activeCalls" class="call-list scroll-vertical">
            </div>
        </section>
    </main>

    <footer class="viewer-footer">
        <div class="summary-box">
            <div class="sb-label">ACTIVE CALLS</div>
            <div class="sb-value" id="sbActive">0</div>
        </div>

        <div class="summary-box">
            <div class="sb-label">WAITING</div>
            <div class="sb-value" id="sbWaiting">0</div>
        </div>

        <div class="summary-box">
            <div class="sb-label">ON THE WAY</div>
            <div class="sb-value" id="sbOnWay">0</div>
        </div>

        <div class="summary-box">
            <div class="sb-label">CLOSED TODAY</div>
            <div class="sb-value" id="sbClosed">0</div>
        </div>
    </footer>

    <div id="authModal" class="auth-modal" aria-hidden="true">
        <div class="auth-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
            <h3 id="authTitle">Authorize Action</h3>
            <p id="authSummary" class="auth-summary">Enter your User ID and PIN to continue.</p>

            <label for="authUserId">User ID</label>
            <input id="authUserId" class="viewer-input" inputmode="numeric" autocomplete="off" placeholder="Scan badge or enter User ID" />

            <label for="authPin">PIN</label>
            <input id="authPin" class="viewer-input" inputmode="numeric" autocomplete="off" type="password" placeholder="Enter PIN" />

            <div id="authResolutionWrap" class="auth-resolution-wrap hidden">
                <label for="authResolutionSummary">Resolution Summary</label>
                <textarea id="authResolutionSummary" class="viewer-input auth-resolution-input" rows="4" placeholder="What was the issue / fix?"></textarea>
            </div>

            <div id="authError" class="auth-error"></div>

            <div class="auth-actions">
                <button id="authCancel" class="btn-secondary" type="button">Cancel</button>
                <button id="authSubmit" class="btn-green" type="button">Confirm</button>
            </div>
        </div>
    </div>

</div>

<script src="viewer.js?v=20260625-resolution-summary"></script>
</body>
</html>
