<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floor Flow Onboarding</title>
  <link rel="stylesheet" href="css/onboarding.css" />
</head>

<body>
  <main class="onboarding-shell">
    <section class="onboarding-card">
      <div class="onboarding-top">
        <div class="brand-mark">
          <span class="brand-f">F</span>
        </div>
        <div>
          <h1>Floor Flow Setup</h1>
          <p>Get your plant ready in a few quick steps.</p>
        </div>
      </div>

      <div class="progress-wrap">
        <div id="progressText">Step 1 of 7</div>
        <div class="progress-bar">
          <div id="progressFill"></div>
        </div>
      </div>

      <section id="onboardingStep" class="step-body"></section>

      <div class="onboarding-actions">
        <button id="backBtn" class="button ghost">Back</button>
        <button id="nextBtn" class="button primary">Next</button>
      </div>
    </section>
  </main>

  <script type="module" src="js/onboarding.js"></script>
  <script type="module" src="js/offline-resilience.js"></script>
  <script type="module" src="js/production-readiness.js"></script>
  <script type="module" src="js/plant-link-retainer.js"></script>
</body>
</html>
