<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin / Maintenance</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  
  <div class="admin-app-shell">

    <aside class="admin-sidebar">
      <div class="branding-block">
  <img id="plantLogo" alt="Plant Logo" />
</div>



      <div class="admin-side-section">
        <div class="admin-side-label">Admin Tools</div>
        <button class="admin-tool-link active" data-admin-tool="equipment">Equipment</button>
        <button class="admin-tool-link" data-admin-tool="areas">Areas</button>
        <button class="admin-tool-link" data-admin-tool="users">Users</button>
        <button class="admin-tool-link" data-admin-tool="activity">Activity Logs</button>
        <button class="admin-tool-link" data-admin-tool="parts">Parts Library</button>
        <button class="admin-tool-link" data-admin-tool="reports">Reports</button>
        <button class="admin-tool-link" data-admin-tool="system">System Controls</button>
        <button type="button" class="sidebar-link plant-access-sidebar-btn" data-open-plant-access>Plant Access Links</button>

        <button id="logoutBtn" class="button danger-outline">Sign Out</button>


      </div>

      <div class="admin-side-section admin-screen-links">
        <div class="admin-side-label">Plant Screens</div>
        <a class="admin-screen-link" href="display.html">Display Board</a>
        <a class="admin-screen-link" href="board.html">Floor Interactive Board</a>
        <a class="admin-screen-link" href="supervisor.html">Supervisor</a>
        <a class="admin-screen-link" href="index.html">Home</a>
      </div>
</aside>

    <main class="admin-main">
      <header class="admin-page-header">
        <div>
          <h1>Admin / Maintenance</h1>
          <p class="muted">System control, users, equipment, areas, and operations.</p>
        </div>
      </header>
<section id="adminContent" class="admin-workspace">
        <div class="muted">Loading admin tools...</div>
      </section>

      <footer class="display-footer">
        © One T Media Group
      </footer>
    </main>

  </div>

  <script type="module" src="js/branding-loader.js"></script>
  <script type="module" src="js/admin.js"></script>
  <script type="module" src="js/mobile-nav.js"></script>
  <script type="module" src="js/offline-resilience.js"></script>
  <script type="module" src="js/production-readiness.js"></script>
  <script type="module" src="js/plant-link-retainer.js"></script>

  <div id="plantAccessModal" class="modal-backdrop plant-access-modal-backdrop" hidden>
    <div class="modal-card plant-access-modal-card">
      <div class="modal-header">
        <div>
          <h2>Plant Access Links</h2>
          <p>Share these links with tablets, phones, TVs, and other computers.</p>
        </div>
        <button type="button" class="button secondary" data-close-plant-access>Close</button>
      </div>
      <div id="adminPlantAccessLinks" class="plant-access-modal-content"></div>
    </div>
  </div>

</body>
</html>
