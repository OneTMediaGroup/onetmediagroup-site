<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floor Flow | Display Board</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" href="/assets/images/General/floorflow-favicon.png" />
  <link rel="apple-touch-icon" href="/assets/images/General/floorflow-favicon.png" />
  <meta property="og:image" content="https://onetmediagroup.ca/assets/images/General/floorflow-favicon.png" />
  <meta name="twitter:image" content="https://onetmediagroup.ca/assets/images/General/floorflow-favicon.png" />
</head>

<body class="display-board-body">
  <div class="display-board-shell">

    <header class="display-board-header">
      <div class="display-brand-wrap">
        <div class="branding-block">
  <img id="plantLogo" alt="Plant Logo" />
</div>


        <div>
          <h1>Floor Flow</h1>
<p>Display Board</p>
        </div>
      </div>

      <div class="display-controls">
  <label>
    Area
    <select id="displayAreaFilter">
      <option value="all">All Areas</option>
    </select>
  </label>

  <label>
    Auto Scroll
    <select id="displayAutoScroll">
      <option value="on">On</option>
      <option value="off">Off</option>
    </select>
  </label>

  <button id="displayFullscreenBtn" class="button secondary">
    Fullscreen
  </button>

  <div class="display-sync-card">
    <span>Last Sync</span>
    <strong id="displayLastSync">--</strong>
  </div>
</div>
    </header>

    <main id="displayScrollArea" class="display-board-scroll-area">
      <section id="displayBoardContent" class="display-board-content">
        <div class="display-empty-state">Loading display board...</div>
      </section>
    </main>

    <footer class="display-footer">
      © One T Media Group
    </footer>
  </div>

  <script type="module" src="js/branding-loader.js"></script>
  <script type="module" src="js/display-board.js"></script>
  <script type="module" src="js/offline-resilience.js"></script>
  <script type="module" src="js/production-readiness.js"></script>
  <script type="module" src="js/plant-link-retainer.js"></script>

<script>
window.addEventListener('DOMContentLoaded', () => {
  const polishDisplayCurrentLabel = () => {
    document.querySelectorAll('body *').forEach((el) => {
      if (el.children.length !== 0) return;
      if (el.textContent.trim() === 'RUNNING') {
        el.textContent = 'CURRENT';
      }
    });
  };

  polishDisplayCurrentLabel();
  setInterval(polishDisplayCurrentLabel, 300);
});
</script>

</body>
</html>
