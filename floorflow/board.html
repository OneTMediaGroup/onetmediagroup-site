<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floor Flow</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="display-board-body">
  <div class="display-board-shell">

    <header class="display-board-header">
      <div class="display-brand-wrap">
        <div class="branding-block">
  <img id="plantLogo" alt="Plant Logo" />
</div>


        <div>
          <h1>Floor Flow</h1>
          <p>Touchscreen easy access</p>
        </div>
      </div>

      <div class="display-controls">
        <label>
          Area
          <select id="areaFilterBoard">
            <option value="all">All</option>
          </select>
        </label>

        <button class="button" id="refreshBoardBtn">Refresh</button>

        <div class="display-sync-card">
          <span>Last Sync</span>
          <strong id="syncTimeBoard">--</strong>
        </div>
      </div>
    </header>

    <main class="display-board-scroll-area">
      <section class="press-grid die-board-grid" id="pressGrid"></section>
    </main>

    <footer class="display-footer">
      © One T Media Group
    </footer>
  </div>

  <dialog id="setupDialog" class="action-dialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-header">
        <div>
          <h2 id="dialogTitle">Setup</h2>
          <p id="dialogSubtitle" class="muted"></p>
        </div>
        <button class="icon-button" value="cancel">✕</button>
      </div>

      <div class="dialog-body">
        <div class="info-grid">
          <div><span>Part</span><strong id="dialogPart">--</strong></div>
          <div><span>Qty Remaining</span><strong id="dialogQty">--</strong></div>
          <div><span>Status</span><strong id="dialogStatus">--</strong></div>
          <div><span>Updated</span><strong id="dialogUpdated">--</strong></div>
        </div>

        <label>
          Notes
          <textarea id="dialogNotes" rows="4" placeholder="Add setup notes, issue details, or handoff comments..."></textarea>
        </label>

        <div class="quick-notes">
          <button class="chip" type="button" data-note="Tooling ready">Tooling ready</button>
          <button class="chip" type="button" data-note="Waiting on forklift">Waiting on forklift</button>
          <button class="chip" type="button" data-note="Waiting on maintenance">Waiting on maintenance</button>
          <button class="chip" type="button" data-note="Setup cleared">Setup cleared</button>
        </div>
      </div>

      <div class="dialog-actions stack">
        <button type="button" class="button full" data-action="ready">Ready for Next Job</button>
        <button type="button" class="button success full" data-action="change_complete">Complete + Shift</button>
        <button type="button" class="button danger full" data-action="blocked">Flag Maintenance</button>
        <button type="button" class="button full" data-action="clear">Clear Setup</button>
        <button type="button" class="button full" data-action="save_notes">Save Notes Only</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/branding-loader.js"></script>
  <script type="module" src="js/board.js"></script>
  <script type="module" src="js/offline-resilience.js"></script>
  <script type="module" src="js/production-readiness.js"></script>
  <script type="module" src="js/plant-link-retainer.js"></script>










<script>
window.addEventListener('DOMContentLoaded', () => {
  const setPill = (el, bg, fg, border) => {
    el.style.setProperty('background', bg, 'important');
    el.style.setProperty('background-color', bg, 'important');
    el.style.setProperty('color', fg, 'important');
    el.style.setProperty('border-color', border, 'important');
    el.style.setProperty('border', `1px solid ${border}`, 'important');
    el.style.setProperty('border-radius', '999px', 'important');
    el.style.setProperty('font-weight', '900', 'important');
    el.style.setProperty('box-shadow', 'none', 'important');
  };

  const polishTouchBoardStatus = () => {
    document.querySelectorAll('body *').forEach((el) => {
      if (el.children.length !== 0) return;

      const text = el.textContent.trim();
      const key = text.toLowerCase();

      if (key === 'current') {
        el.textContent = 'Running';
        setPill(el, 'rgba(34, 197, 94, 0.24)', '#166534', 'rgba(34, 197, 94, 0.60)');
        return;
      }

      if (key === 'running') {
        setPill(el, 'rgba(34, 197, 94, 0.24)', '#166534', 'rgba(34, 197, 94, 0.60)');
        return;
      }

      if (key === 'paused') {
        setPill(el, 'rgba(245, 158, 11, 0.24)', '#92400e', 'rgba(245, 158, 11, 0.60)');
        return;
      }

      if (key === 'next') {
        setPill(el, 'rgba(59, 130, 246, 0.12)', '#1d4ed8', 'rgba(59, 130, 246, 0.38)');
      }
    });
  };

  polishTouchBoardStatus();
  setInterval(polishTouchBoardStatus, 300);
});
</script>

</body>
</html>
